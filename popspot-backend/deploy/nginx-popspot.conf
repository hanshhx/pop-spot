# =================================================================
# /etc/nginx/sites-available/popspot
# 심볼릭링크: sudo ln -s /etc/nginx/sites-available/popspot /etc/nginx/sites-enabled/
# =================================================================
# Vercel(프론트) ↔ GCP VM(백엔드) 사이의 리버스 프록시.
# - HTTPS 종료(TLS termination)
# - WebSocket(STOMP/SockJS) 업그레이드 처리
# - X-Forwarded-* 헤더로 Spring 의 forward-headers-strategy=framework 와 연동
# =================================================================

# 1) HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name api.popspot.co.kr;

    # certbot 갱신용 ACME 챌린지
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2) HTTPS — 메인 진입점
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.popspot.co.kr;

    # Let's Encrypt 인증서 (sudo certbot --nginx -d api.popspot.co.kr)
    ssl_certificate     /etc/letsencrypt/live/api.popspot.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.popspot.co.kr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 클라이언트 → 백엔드 업로드 사이즈 (10MB 와 일치)
    client_max_body_size 12m;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ====================================================
    # WebSocket 엔드포인트 (STOMP over SockJS)
    # ====================================================
    location ~ ^/(ws-stomp|ws-planning) {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ====================================================
    # 일반 API + uploads 정적
    # ====================================================
    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
}
