# ==========================================
# 0. 프로필 / 공통 설정
# ==========================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${SERVER_PORT:8080}
spring.application.name=popspot-backend

# ==========================================
# 1. 도메인 / 프론트엔드 / 업로드 경로
#    - prod 에서는 환경변수로 Vercel 도메인 주입
# ==========================================
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:3000/oauth/callback}
# 쉼표로 여러 도메인 허용 (Vercel preview 포함). prod 에서는 화이트리스트만!
app.allowed-origins=${APP_ALLOWED_ORIGINS:http://localhost:3000}
app.upload.path=${APP_UPLOAD_PATH:${user.dir}/uploads/}
# 업로드 파일의 공개 URL 생성 시 X-Forwarded-Host 헤더를 신뢰할 호스트 정규식 패턴 (쉼표 구분).
# 비어 있으면 헤더를 무시하고 컨테이너가 본 서버 이름만 사용 (가장 보수적). prod 에서는 반드시 설정.
app.upload.allowed-host-patterns=${APP_UPLOAD_ALLOWED_HOST_PATTERNS:}

# ==========================================
# 2. 메일 (Gmail SMTP)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================
# 3. PostgreSQL DataSource
# ==========================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/popspot_db}
spring.datasource.username=${DB_USERNAME:popspot_user}
spring.datasource.password=${DB_PASSWORD:}
# HikariCP (운영 안정성)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# ==========================================
# 4. JPA (Hibernate)
#    - dev 는 update, prod 는 validate (application-prod.properties 에서 override)
# ==========================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# OSIV: JSON 직렬화 도중 lazy 컬렉션 접근 가능. EntityGraph 가 못 잡는 엣지 케이스 안전망.
# 운영 안정성 > N+1 잠재 위험 (이미 주요 경로는 EntityGraph 로 fetch 됨).
spring.jpa.open-in-view=true
spring.jackson.time-zone=Asia/Seoul

# ==========================================
# 5. Redis
# ==========================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ==========================================
# 6. JWT
# ==========================================
# !! 절대 기본값 두지 말 것. 운영에서 누락 시 부팅 실패 (JwtAuthenticationFilter @PostConstruct 검증)
jwt.secret=${JWT_SECRET:}
jwt.access-token-validity-ms=${JWT_ACCESS_TOKEN_TTL:3600000}

# ==========================================
# 7. OAuth2 - Google
# ==========================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# ==========================================
# 8. OAuth2 - Kakao
# ==========================================
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:}
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# 카카오 REST API (지도/검색용 - OAuth 와 별개)
kakao.api.key=${KAKAO_REST_API_KEY:}
kakao.rest.api-key=${KAKAO_REST_API_KEY:}

# ==========================================
# 9. OAuth2 - Naver
# ==========================================
spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID:}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET:}
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=name,email,profile_image
spring.security.oauth2.client.registration.naver.client-name=Naver

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

naver.client.id=${NAVER_CLIENT_ID:}
naver.client.secret=${NAVER_CLIENT_SECRET:}

# ==========================================
# 10. MyBatis & Logging
# ==========================================
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.example.popspotbackend=${LOG_LEVEL_APP:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:INFO}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
# 어드민 라이브 로그 SSE 가 tail 할 파일. 비어 있으면 SSE 비활성, 콘솔만 출력.
# 운영에서는 systemd 서비스가 쓰기 권한 가진 경로로 (예: /var/log/popspot/popspot.log).
logging.file.name=${LOG_FILE_PATH:}
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

# ==========================================
# 11. 외부 API 키
# ==========================================
seoul.api.key=${SEOUL_API_KEY:}
pexels.api-key=${PEXELS_API_KEY:}
tmap.app-key=${TMAP_APP_KEY:}
algolia.app-id=${ALGOLIA_APP_ID:}
algolia.api-key=${ALGOLIA_API_KEY:}

# ==========================================
# 11.5 YouTube Data API v3 (음악 → 팝업 매칭)
#     - 무료 한도: 일일 10,000 unit (검색 1회 = 100 unit)
#     - 발급: https://console.cloud.google.com/apis/library/youtube.googleapis.com
# ==========================================
youtube.api-key=${YOUTUBE_API_KEY:}

# ==========================================
# 11.6 Spotify Web API (곡 검색 전용)
#      - Client Credentials Flow → access token 발급
#      - 검색 quota 사실상 무제한 (분당 ~100)
#      - 발급: https://developer.spotify.com/dashboard
# ==========================================
spotify.client-id=${SPOTIFY_CLIENT_ID:}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET:}

# ==========================================
# 12. AI (Groq — OpenAI 호환 API)
#     - 키 발급: https://console.groq.com/keys
#     - 한도: https://console.groq.com/docs/rate-limits (모델별로 다름, 조직 단위 적용)
#
#     ⚠️ 무료 한도에서 병목은 RPD 가 아니라 TPD(일일 토큰) 다.
#        gpt-oss-120b / gpt-oss-20b / qwen3.6-27b (free): RPM 30 · RPD 1,000 · TPM 8K · TPD 200K
#        고정 프롬프트만 약 1,970자(≈1,000~1,500 토큰)라 스니펫이 0개여도 하루 150회 안팎이 상한이다.
#        키워드 수를 늘리기 전에 반드시 TPD 예산을 먼저 계산할 것.
#
#     ⚠️ 한도는 API 키가 아니라 "조직" 단위로 적용된다. 키를 나눠도 쿼터는 공유된다.
#        기능 간 격리는 서로 다른 "모델" 을 쓰는 방식으로만 가능하다(모델별로 한도가 따로 잡힘).
#
#     ⚠️ llama-3.3-70b-versatile / llama-3.1-8b-instant 는 2026-08-16 종료 예정이다.
#        대체: 70b → openai/gpt-oss-120b 또는 qwen/qwen3.6-27b, 8b → openai/gpt-oss-20b
#        (무료·Developer 티어 대상. committed-spend Enterprise 만 제외)
# ==========================================
groq.api-key=${GROQ_API_KEY:}
groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}

# 기능별 모델 분리 — 한도가 모델 단위로 잡히므로, 크롤러가 토큰을 소진해도 사용자 기능이 살아남는다.
# 해석 순서: AI_*_MODEL → GROQ_MODEL_NAME(레거시) → 코드 기본값
#   운영 env 에 GROQ_MODEL_NAME 이 남아 있으면 둘 다 그 값을 쓴다(= 이 변경만 배포해도 동작 불변).
#   마이그레이션은 운영 env 에서 AI_USER_MODEL / AI_CRAWLER_MODEL 을 지정해 단계적으로 한다.
ai.user.model-name=${AI_USER_MODEL:${GROQ_MODEL_NAME:openai/gpt-oss-120b}}
ai.crawler.model-name=${AI_CRAWLER_MODEL:${GROQ_MODEL_NAME:openai/gpt-oss-20b}}

# 로컬 Ollama 크롤러. enabled=false(기본)면 크롤러는 Groq 만 쓴다 — 이 설정을 배포해도 켜기 전까지 동작 불변.
# true 로 켜면: PC 가 응답하면 무제한 로컬로, 꺼져 있으면 Groq 로 fallback. base-url/health-url 은 개인 환경값이라
# 코드 기본값을 비워 두고 반드시 env(.env / popspot.env)로 주입한다. 형식은 .env.example 참고.
ai.crawler.local.enabled=${AI_CRAWLER_LOCAL_ENABLED:false}
ai.crawler.local.base-url=${AI_CRAWLER_LOCAL_BASE_URL:}
ai.crawler.local.model-name=${AI_CRAWLER_LOCAL_MODEL:qwen2.5:7b}
ai.crawler.local.health-url=${AI_CRAWLER_LOCAL_HEALTH_URL:}

# ==========================================
# 13. PortOne(아임포트) 결제 서버 검증용
#     - 콘솔 > 결제 연동 > 일반결제(REST API)
# ==========================================
iamport.api-key=${IAMPORT_API_KEY:}
iamport.api-secret=${IAMPORT_API_SECRET:}

# ==========================================
# 14. 리버스 프록시(nginx) 뒷단 → HTTPS 인식
# ==========================================
server.forward-headers-strategy=framework

# ==========================================
# 15. Sentry
# ==========================================
sentry.dsn=${SENTRY_DSN:}
sentry.send-default-pii=false
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.2}

# ==========================================
# 16. Actuator (운영에서는 health 만 외부 노출)
# ==========================================
management.endpoints.web.exposure.include=${ACTUATOR_EXPOSE:health}
management.endpoint.health.show-details=never
management.endpoint.metrics.enabled=true

# ==========================================
# 17. 멀티파트 업로드 사이즈
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# 18. 팝업스토어 자동수집 (Naver/Kakao Search API + Gemini)
# ==========================================
# 운영 ON / 개발 OFF 가 기본. 프로덕션에서만 명시적으로 true.
popspot.crawler.enabled=${POPSPOT_CRAWLER_ENABLED:false}
# Gemini 신뢰도 점수 ≥ 이 값이면 자동게시, 그 외 admin 검수 큐
popspot.crawler.confidence-threshold=${POPSPOT_CRAWLER_CONFIDENCE:0.8}
# 자동게시 목표치 — 이만큼 모이면 트리거 조기 종료. 0 또는 빈 값이면 제한 없음.
popspot.crawler.max-auto-published=${POPSPOT_CRAWLER_MAX_AUTO_PUBLISHED:0}
# 한 회차에 다룰 키워드 수. 커서 위치부터 이만큼만 검색·처리하고 커서를 전진시켜 전체를 여러 회차에 나눠 순회한다.
# TPM 8000 제약상 회차당 실제 LLM 성공 호출은 십수 회가 한계라, 전체(≈390)를 한 번에 돌면 앞부분만 처리되고 뒤는 버려진다.
popspot.crawler.max-keywords-per-run=${POPSPOT_CRAWLER_MAX_KEYWORDS_PER_RUN:20}
# 로컬 Ollama 로 크롤할 때 하루 GPU 예산(분). 3시간이면 신규 팝업을 다 잡고 남는다. PC 껐다 켜도 누적.
popspot.crawler.local.daily-budget-minutes=${POPSPOT_CRAWLER_LOCAL_BUDGET_MINUTES:180}
# 로컬 켜졌을 때 주기 수집 간격(ms). 기본 10분마다 한 배치.
popspot.crawler.local.tick-ms=${POPSPOT_CRAWLER_LOCAL_TICK_MS:600000}
# 검색 API 일일 상한 — 각 한도의 이 비율까지만 쓴다(0.5 = 절반). 로컬 크롤 대량화 시 검색 폭증 방지.
popspot.crawler.search.naver-daily-limit=${POPSPOT_CRAWLER_NAVER_LIMIT:25000}
popspot.crawler.search.kakao-daily-limit=${POPSPOT_CRAWLER_KAKAO_LIMIT:30000}
popspot.crawler.search.usage-ratio=${POPSPOT_CRAWLER_SEARCH_RATIO:0.5}
# LLM 한 번에 넣는 스니펫 수. gpt-oss-20b 실측상 40개는 호출당 ≈7,810 토큰이라 TPM 8000 을 한 호출로 소진했다. 12로 낮춰 분당 여러 번 호출.
popspot.crawler.max-snippets-per-request=${POPSPOT_CRAWLER_MAX_SNIPPETS:12}
# 기존 자동수집 데이터 중 날짜가 비어 있는 원문을 제한적으로 재처리한다. 같은 원문은 기본 7일에 한 번만 큐에 넣는다.
popspot.crawler.date-backfill-limit=${POPSPOT_CRAWLER_DATE_BACKFILL_LIMIT:25}
popspot.crawler.date-backfill-cooldown-days=${POPSPOT_CRAWLER_DATE_BACKFILL_COOLDOWN_DAYS:7}
# Cron (KST). 하루 2회 (04·16시). 두 프로퍼티가 각각 1개 시각을 담는다(스케줄러 메서드 2개).
# 키워드 391개(중복 제거 후) × (검색 4채널 × 0.8s + Groq 2.2s) ≈ 1회 37분.
#
# 하루 4회(04·10·16·22)로 늘렸다가 되돌렸다. 이유는 검색 API 쿼터가 아니라 Groq TPD 다 —
# 고정 프롬프트만 ≈1,000~1,500 토큰이라 무료 TPD 200K 로는 스니펫이 0개여도 하루 150회 안팎이
# 상한인데, 4회면 1,564회가 필요했다. 늘리기 전에 토큰 예산을 먼저 계산할 것.
popspot.crawler.cron=${POPSPOT_CRAWLER_CRON:0 0 4 * * *}
popspot.crawler.cron-afternoon=${POPSPOT_CRAWLER_CRON_AFTERNOON:0 0 16 * * *}
# Geocoding 자동 백필 — 좌표 누락 row 를 채워 지도 노출량 ↑.
# 04:50 = 1차 크롤(04:00~04:37) 종료 후. 크롤이 길어져 기존 04:30 은 크롤과 겹쳤다.
popspot.crawler.geocode-backfill-cron=${POPSPOT_GEOCODE_BACKFILL_CRON:0 50 4 * * *}
# 스톡 사진은 사용자 오해를 막기 위해 기본 비활성. 명시적으로 true인 경우에만 기존 Pexels 백필을 실행한다.
popspot.photo.backfill-enabled=${POPSPOT_PHOTO_BACKFILL_ENABLED:false}
popspot.photo.backfill-cron=${POPSPOT_PHOTO_BACKFILL_CRON:0 0 5 * * *}
# 자동 중복 정리 — 이름 완전일치 중복을 매 크롤 종료 뒤(05:10·17:10 KST) 걷어냄.
popspot.dedup.cron=${POPSPOT_DEDUP_CRON:0 10 5,17 * * *}
# 1회 백필 최대 건수(Pexels 무료 한도 200/시간 고려). 신규분은 매일 이만큼씩 채워짐.
popspot.photo.backfill-limit=${POPSPOT_PHOTO_BACKFILL_LIMIT:150}
# 운영자 takedown 알림 메일 수신처 (선택)
popspot.crawler.takedown-notify-email=${POPSPOT_TAKEDOWN_NOTIFY_EMAIL:}

# v2.21-S4 — popspot.popup.min-visible-confidence 키 제거 (운영자 결정).
# 자동수집 confidence-threshold 가 자동게시 vs 검수큐 분기를 처리하므로 추가 사용자
# 노출 게이트는 핀 누락 부작용만 일으킴. 운영자가 검수 통과시킨 데이터는 신뢰도와
# 무관하게 노출되어야 함.

# ==========================================
# 18.5 Spotify OAuth + Web Playback SDK (v2.21-S10)
# ==========================================
# Spotify Premium 사용자에 한해 풀트랙 320kbps 재생. Free / 미연동 사용자는 30초 preview.
# 등록: https://developer.spotify.com/dashboard 에서 앱 생성 후 Client ID / Secret 받기.
# Redirect URI 는 운영/개발 두 개 등록 필요:
#   - 운영:  https://popspot.co.kr/api/spotify/callback
#   - 개발:  http://localhost:8080/api/spotify/callback
spotify.oauth.client-id=${SPOTIFY_OAUTH_CLIENT_ID:}
spotify.oauth.client-secret=${SPOTIFY_OAUTH_CLIENT_SECRET:}
spotify.oauth.redirect-uri=${SPOTIFY_OAUTH_REDIRECT_URI:http://localhost:8080/api/spotify/callback}
# 콜백 처리 후 프론트로 돌려보낼 URL (성공/실패 쿼리 부착)
spotify.oauth.frontend-redirect=${SPOTIFY_OAUTH_FRONTEND_REDIRECT:http://localhost:3000/}
# Token 암호화 키 — AES-256 (Base64 encoded 32 bytes = 44자).
# 개발 환경에서 자동 생성: openssl rand -base64 32
# 운영 환경: 반드시 환경변수로 주입. 키 분실 = 저장된 모든 토큰 무효.
spotify.token.encryption-key=${SPOTIFY_TOKEN_ENCRYPTION_KEY:}

# ==========================================
# 19. DB 자동 백업 (v2.17)
# ==========================================
# 운영 환경에서만 true. pg_dump 가 PATH 안에 있어야 동작.
popspot.backup.enabled=${POPSPOT_BACKUP_ENABLED:false}
# 매일 새벽 3시 (KST)
popspot.backup.cron=${POPSPOT_BACKUP_CRON:0 0 3 * * *}
# 저장 디렉토리 (default ./backups). 운영에서는 충분한 공간 + 외부 디스크 권장.
popspot.backup.dir=${POPSPOT_BACKUP_DIR:./backups}
# 보관 일수
popspot.backup.retention-days=${POPSPOT_BACKUP_RETENTION_DAYS:7}
# pg_dump 실행 경로 (PATH 안이면 그냥 'pg_dump')
popspot.backup.pg-dump-path=${POPSPOT_PG_DUMP_PATH:pg_dump}

# ==========================================
# 20. SLA 알림 (v2.17)
# ==========================================
# Takedown PENDING 24h 미처리 시 / Feedback PENDING 24h 미답변 시 알림 수신처.
# 비어 있으면 알림 비활성.
popspot.sla.notify-email=${POPSPOT_SLA_NOTIFY_EMAIL:}
popspot.sla.cron=${POPSPOT_SLA_CRON:0 0 * * * *}

# ==========================================
# 21. 위시 만료 D-3 알림 (v2.18.1)
# ==========================================
# 운영 환경에서만 true. 매일 09:00 endDate=D-3 인 팝업을 찜한 사용자에게 메일 발송.
popspot.wishlist.enabled=${POPSPOT_WISHLIST_ENABLED:false}
popspot.wishlist.expiry-cron=${POPSPOT_WISHLIST_EXPIRY_CRON:0 0 9 * * *}
popspot.wishlist.expiry-days-before=${POPSPOT_WISHLIST_EXPIRY_DAYS:3}

# ==========================================
# 22. 약관 버전 관리 (v2.19)
# ==========================================
# 약관 / 개인정보 처리방침이 개정되면 이 값을 올려서 (예: 1.0 → 2.0) 모든 사용자에게
# 다음 로그인 시 재동의 모달을 띄운다.
popspot.terms.current-version=${POPSPOT_TERMS_VERSION:1.0}
