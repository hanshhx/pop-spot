# ==========================================
# 운영(prod) 프로필 — application.properties 위에 덮어쓰기
# 실행 방법: SPRING_PROFILES_ACTIVE=prod  (systemd EnvironmentFile 또는 -Dspring.profiles.active=prod)
# ==========================================

# 운영에서는 절대 update / create 금지! 스키마 변경은 Flyway 가 담당.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway 활성화
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# 운영 DB는 ddl-auto=update와 수동 SQL로 V22까지 적용된 기존 스키마이다.
# Flyway 이력이 없는 첫 prod 기동에서는 V22를 기준점으로 기록하고 V23부터 실행한다.
spring.flyway.baseline-version=22
spring.flyway.baseline-description=legacy-schema-through-v22

# 운영 백업은 명시적으로 false를 주지 않는 한 활성화한다.
popspot.backup.enabled=${POPSPOT_BACKUP_ENABLED:true}

# 로그 레벨
logging.level.root=INFO
logging.level.com.example.popspotbackend=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# Actuator 외부에는 health 만
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Sentry
sentry.send-default-pii=false
sentry.traces-sample-rate=0.2

# DevTools 차단 (운영 환경 안전)
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
