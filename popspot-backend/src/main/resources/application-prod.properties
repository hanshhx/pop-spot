# ==========================================
# 운영(prod) 프로필 — application.properties 위에 덮어쓰기
# 실행 방법: SPRING_PROFILES_ACTIVE=prod  (systemd EnvironmentFile 또는 -Dspring.profiles.active=prod)
# ==========================================

# 운영에서는 절대 update / create 금지! 스키마 변경은 Flyway 가 담당.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway 활성화
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# 로그 레벨
logging.level.root=INFO
logging.level.com.example.popspotbackend=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# Actuator 외부에는 health 만
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Sentry
sentry.send-default-pii=false
sentry.traces-sample-rate=0.2

# DevTools 차단 (운영 환경 안전)
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
